name: Sync Issues to Private Repo

on:
  issues:
    types: [opened]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Format Issue
        id: format
        run: |
          echo "BODY<<EOF" >> $GITHUB_OUTPUT
          echo "### 🐛 Bug Report (From Support Repo)" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "${{ github.event.issue.body }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "---" >> $GITHUB_OUTPUT
          echo "🔗 Original Issue: ${{ github.event.issue.html_url }}" >> $GITHUB_OUTPUT
          echo "👤 User: ${{ github.event.issue.user.login }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Issue in Private Repo
        run: |
          curl -X POST https://api.github.com/repos/Khizar-crewLogix/testissue/issues \
          -H "Authorization: token ${{ secrets.PRIVATE_REPO_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d "$(jq -n \
            --arg title "${{ github.event.issue.title }}" \
            --arg body "${{ steps.format.outputs.BODY }}" \
            '{title: $title, body: $body}')"
