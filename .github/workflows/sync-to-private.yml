name: Sync Issues to Private Repo

on:
  issues:
    types: [opened]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Format Issue
        id: format
        run: |
          BODY="### 🐛 Bug Report (From Support Repo)

${{ github.event.issue.body }}

---

🔗 Original Issue: ${{ github.event.issue.html_url }}
👤 User: ${{ github.event.issue.user.login }}"

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Issue in Private Repo
        run: |
          curl -X POST https://api.github.com/repos/Khizar-crewLogix/testissue/issues \
          -H "Authorization: token ${{ secrets.PRIVATE_REPO_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d "$(jq -n \
            --arg title "${{ github.event.issue.title }}" \
            --arg body "${{ steps.format.outputs.body }}" \
            '{title: $title, body: $body}')"
